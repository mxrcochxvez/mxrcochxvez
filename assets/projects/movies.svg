  <style>.arrow{animation:nudge 2.2s ease-in-out infinite}@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}@media(prefers-reduced-motion:reduce){.arrow{animation:none!important}}</style>
