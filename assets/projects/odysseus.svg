<svg xmlns="http://www.w3.org/2000/svg" width="580" height="230" viewBox="0 0 580 230" role="img" aria-labelledby="title desc">
  <title id="title">Odysseus Babbage</title>
  <desc id="desc">A self-hosted workspace for agents, research, documents, email, notes, calendar, and local model workflows. Technologies: AI Agents, MCP, Local Models, Docker.</desc>
  <defs>
