    <text x="34" y="75" fill="#FFFFFF" font-size="25" font-weight="830">Odysseus Babbage</text>
    <text x="34" y="105" fill="#C9DFE9" font-size="15">A self-hosted workspace for agents, research, documents,</text>
    <text x="34" y="130" fill="#C9DFE9" font-size="15">email, notes, calendar, and local model workflows.</text>
    <text x="34" y="178" fill="#84AFC2" font-size="12" font-weight="700">AI Agents  ·  MCP  ·  Local Models  ·  Docker</text>
