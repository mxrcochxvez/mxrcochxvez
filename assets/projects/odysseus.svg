  <rect x="6" y="6" width="568" height="218" rx="24" fill="none" stroke="#F58025" stroke-opacity=".42" stroke-width="2"/>
  <rect x="6" y="6" width="7" height="218" rx="3.5" fill="#F58025"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">
