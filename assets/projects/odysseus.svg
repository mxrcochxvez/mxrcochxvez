      <stop offset="0%" stop-color="#071722"/>
      <stop offset="100%" stop-color="#0C2A3D"/>
    </linearGradient>
    <pattern id="hex" width="42" height="36.4" patternUnits="userSpaceOnUse">
      <path d="M10.5 1H31.5L41 18.2 31.5 35.4H10.5L1 18.2Z" fill="none" stroke="#8DD8F5" stroke-opacity=".055"/>
    </pattern>
  </defs>
  <style>
