<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Marco Chavez Jr. — Software Architect and Full-Stack Engineer</title>
  <desc id="desc">A dark blue and orange honeycomb banner with Marco Chavez Jr.'s name and engineering focus.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071522"/>
      <stop offset="52%" stop-color="#0F334D"/>
      <stop offset="100%" stop-color="#122B3C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F58025"/>
      <stop offset="100%" stop-color="#FFB15C"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="100%" stop-color="#2A9DCC"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#F58025" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#0F4973" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#071522" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="hexPattern" width="72" height="62.35" patternUnits="userSpaceOnUse">
      <path d="M18 1 H54 L71 31.175 L54 61.35 H18 L1 31.175 Z" fill="none" stroke="#8BC5E3" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <clipPath id="rounded">
      <rect x="8" y="8" width="1184" height="344" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect x="8" y="8" width="1184" height="344" rx="28" fill="url(#background)"/>
    <rect x="8" y="8" width="1184" height="344" rx="28" fill="url(#glow)"/>
    <rect x="650" y="-10" width="590" height="390" fill="url(#hexPattern)" transform="rotate(-5 945 180)"/>

    <circle cx="1060" cy="74" r="120" fill="#F58025" opacity="0.06"/>
    <circle cx="980" cy="260" r="170" fill="#4CC9F0" opacity="0.05"/>

    <g transform="translate(780 56)" filter="url(#shadow)">
      <path d="M110 0 H214 L266 90 L214 180 H110 L58 90 Z" fill="#0A2232" stroke="url(#accent)" stroke-width="4"/>
      <path d="M38 96 H92 L119 143 L92 190 H38 L11 143 Z" fill="#0C2A3E" stroke="url(#cyan)" stroke-width="3" opacity="0.95"/>
      <path d="M229 139 H283 L310 186 L283 233 H229 L202 186 Z" fill="#0B2537" stroke="#F58025" stroke-width="3" opacity="0.88"/>
      <path d="M130 28 H194 L226 83 L194 138 H130 L98 83 Z" fill="url(#accent)" opacity="0.94"/>
      <path d="M142 51 H182 L202 83 L182 115 H142 L122 83 Z" fill="#102C40"/>
      <path d="M154 64 H170 L178 78 L170 92 H154 L146 78 Z" fill="#4CC9F0"/>
    </g>

    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
      <text x="72" y="93" fill="#9FD9F5" font-size="20" font-weight="700" letter-spacing="4">SOFTWARE ARCHITECT • PRODUCT ENGINEER</text>
      <text x="68" y="164" fill="#FFFFFF" font-size="58" font-weight="800" letter-spacing="-1.5">Marco Chavez Jr.</text>
      <rect x="70" y="188" width="474" height="5" rx="2.5" fill="url(#accent)"/>
      <text x="72" y="235" fill="#D9EAF3" font-size="25" font-weight="500">Building accessible, dependable software</text>
      <text x="72" y="268" fill="#D9EAF3" font-size="25" font-weight="500">for people, teams, and growing businesses.</text>

      <g transform="translate(72 298)">
        <rect x="0" y="0" width="128" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
        <text x="64" y="23" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">FULL STACK</text>
        <rect x="142" y="0" width="102" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
        <text x="193" y="23" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">AI + MCP</text>
        <rect x="258" y="0" width="146" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
        <text x="331" y="23" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">ACCESSIBILITY</text>
        <rect x="418" y="0" width="132" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
        <text x="484" y="23" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">LEADERSHIP</text>
      </g>
    </g>
  </g>

  <rect x="8" y="8" width="1184" height="344" rx="28" fill="none" stroke="#5AA9D6" stroke-opacity="0.22" stroke-width="2"/>
</svg>
