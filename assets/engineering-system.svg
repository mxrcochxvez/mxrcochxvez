<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Marco Chavez Jr. engineering system</title>
  <desc id="desc">An animated technology constellation centered on product engineering, surrounded by frontend, backend, data, AI, delivery, accessibility, and leadership capabilities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07131E"/>
      <stop offset="100%" stop-color="#0D2A3C"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB15C"/>
      <stop offset="100%" stop-color="#F58025"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#72E2FF"/>
      <stop offset="100%" stop-color="#238ABF"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#A4DDF3" opacity=".08"/>
    </pattern>
  </defs>
  <style>
    .wire { stroke-dasharray:7 9; animation:flow 12s linear infinite; }
    .node { animation:breathe 4s ease-in-out infinite; }
    .n2 { animation-delay:.6s }.n3 { animation-delay:1.2s }.n4 { animation-delay:1.8s }
    .n5 { animation-delay:2.4s }.n6 { animation-delay:3s }
    @keyframes flow { to { stroke-dashoffset:-128 } }
    @keyframes breathe { 0%,100% { opacity:.78 } 50% { opacity:1 } }
    @media (prefers-reduced-motion: reduce) { .wire,.node { animation:none!important } }
  </style>

  <rect x="8" y="8" width="1184" height="414" rx="28" fill="url(#bg)"/>
  <rect x="8" y="8" width="1184" height="414" rx="28" fill="url(#dots)"/>
  <rect x="8" y="8" width="1184" height="414" rx="28" fill="none" stroke="#5FB8DE" stroke-opacity=".18" stroke-width="2"/>

  <g fill="none" stroke="#74D7F6" stroke-opacity=".36" stroke-width="2">
    <path class="wire" d="M600 213L245 93M600 213L449 82M600 213L755 82M600 213L960 93"/>
    <path class="wire" d="M600 213L208 252M600 213L382 340M600 213L818 340M600 213L992 252"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">
    <text x="48" y="54" fill="#9ED9F2" font-size="16" font-weight="750" letter-spacing="3">SYSTEM MAP</text>

    <g transform="translate(600 213)">
      <path d="M-112 0L-56-97H56L112 0 56 97H-56Z" fill="#0A2232" stroke="url(#orange)" stroke-width="4"/>
      <path d="M-81 0L-41-70H41L81 0 41 70H-41Z" fill="url(#orange)" opacity=".96"/>
      <text y="-8" text-anchor="middle" fill="#092033" font-size="20" font-weight="850">PRODUCT</text>
      <text y="20" text-anchor="middle" fill="#092033" font-size="20" font-weight="850">ENGINEERING</text>
      <circle cx="0" cy="0" r="8" fill="#BDEFFF" filter="url(#glow)" opacity=".78"/>
    </g>

    <g class="node" transform="translate(245 93)">
      <path d="M-70 0L-35-61H35L70 0 35 61H-35Z" fill="#0B2B40" stroke="url(#cyan)" stroke-width="2.5"/>
      <text y="-8" text-anchor="middle" fill="#FFF" font-size="17" font-weight="780">FRONTEND</text>
      <text y="18" text-anchor="middle" fill="#A7DDF3" font-size="13">React · Vue · Next</text>
    </g>

    <g class="node n2" transform="translate(449 82)">
      <path d="M-70 0L-35-61H35L70 0 35 61H-35Z" fill="#0B2B40" stroke="#F59A44" stroke-width="2.5"/>
      <text y="-8" text-anchor="middle" fill="#FFF" font-size="17" font-weight="780">BACKEND</text>
      <text y="18" text-anchor="middle" fill="#FFD2A6" font-size="13">Node · REST · APIs</text>
    </g>

    <g class="node n3" transform="translate(755 82)">
      <path d="M-70 0L-35-61H35L70 0 35 61H-35Z" fill="#0B2B40" stroke="url(#cyan)" stroke-width="2.5"/>
      <text y="-8" text-anchor="middle" fill="#FFF" font-size="17" font-weight="780">DATA</text>
      <text y="18" text-anchor="middle" fill="#A7DDF3" font-size="13">Postgres · GraphQL</text>
    </g>

    <g class="node n4" transform="translate(960 93)">
      <path d="M-70 0L-35-61H35L70 0 35 61H-35Z" fill="#0B2B40" stroke="#F59A44" stroke-width="2.5"/>
      <text y="-8" text-anchor="middle" fill="#FFF" font-size="17" font-weight="780">AI SYSTEMS</text>
      <text y="18" text-anchor="middle" fill="#FFD2A6" font-size="13">Agents · MCP · Local</text>
    </g>

    <g class="node n5" transform="translate(208 252)">
      <path d="M-70 0L-35-61H35L70 0 35 61H-35Z" fill="#0B2B40" stroke="#F59A44" stroke-width="2.5"/>
      <text y="-8" text-anchor="middle" fill="#FFF" font-size="17" font-weight="780">MOBILE</text>
      <text y="18" text-anchor="middle" fill="#FFD2A6" font-size="13">React Native · UX</text>
    </g>

    <g class="node n6" transform="translate(382 340)">
      <path d="M-70 0L-35-61H35L70 0 35 61H-35Z" fill="#0B2B40" stroke="url(#cyan)" stroke-width="2.5"/>
      <text y="-8" text-anchor="middle" fill="#FFF" font-size="17" font-weight="780">DELIVERY</text>
      <text y="18" text-anchor="middle" fill="#A7DDF3" font-size="13">Docker · CI/CD · AWS</text>
    </g>

    <g class="node n2" transform="translate(818 340)">
      <path d="M-70 0L-35-61H35L70 0 35 61H-35Z" fill="#0B2B40" stroke="#F59A44" stroke-width="2.5"/>
      <text y="-8" text-anchor="middle" fill="#FFF" font-size="17" font-weight="780">QUALITY</text>
      <text y="18" text-anchor="middle" fill="#FFD2A6" font-size="13">Testing · Performance</text>
    </g>

    <g class="node n4" transform="translate(992 252)">
      <path d="M-70 0L-35-61H35L70 0 35 61H-35Z" fill="#0B2B40" stroke="url(#cyan)" stroke-width="2.5"/>
      <text y="-8" text-anchor="middle" fill="#FFF" font-size="17" font-weight="780">LEADERSHIP</text>
      <text y="18" text-anchor="middle" fill="#A7DDF3" font-size="13">Mentorship · Clarity</text>
    </g>

    <g transform="translate(600 379)">
      <rect x="-138" y="-20" width="276" height="38" rx="19" fill="#FFF" fill-opacity=".055" stroke="#FFF" stroke-opacity=".12"/>
      <text y="5" text-anchor="middle" fill="#D5EBF5" font-size="14" font-weight="700">ACCESSIBILITY IS PART OF EVERY LAYER</text>
    </g>
  </g>
</svg>